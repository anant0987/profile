<!doctype html>
<!--
  =================================================================
  PORTFOLIO WEBSITE - Modern Developer Portfolio
  =================================================================
  This is a single-page portfolio built with:
  - React 18 for UI components
  - Tailwind CSS for styling
  - Babel for JSX transpilation
  - Custom CSS animations for visual effects
  
  Sections:
  1. Navigation - Fixed top navigation with smooth scroll
  2. Hero - Introduction with typing animation
  3. About - Personal info and stats
  4. Skills - Technical expertise with progress bars
  5. Services - What I do (replaced removed projects)
  6. Contact - Contact form and social links
  7. Footer - Copyright and quick links
  
  Author: Anant Jhunjhunwala
  =================================================================
-->
<html lang="en">
<head>
  <!-- Meta tags for SEO and responsive design -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY Portfolio</title>
  
  <!-- Google Fonts - Multiple font families for typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS - Utility-first CSS framework -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  
  <!-- React and ReactDOM - UI component library -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel - JSX transpiler for in-browser JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- SDK Scripts for element customization -->
  <script src="/_sdk/element_sdk.js"></script>
  
  <!-- 
    =================================================================
    CUSTOM CSS ANIMATIONS
    =================================================================
    Multiple keyframe animations for visual effects:
    - fadeInUp: Elements fade in and move up
    - slideDown: Slide in from top
    - floatBounce: Floating bounce effect
    - shimmer: Shining effect for cards
    - glow: Glowing box-shadow effect
    - gradient: Moving gradient background
    - typing: Typewriter effect
    - float: Gentle floating
    - slideInLeft/Right: Horizontal slide animations
    - pulse-ring: Expanding ring effect
    - blob: Floating blob animation
    =================================================================
  -->
  <style>
    /* Base reset and sizing */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    #root {
      height: 100%;
    }
    * {
      box-sizing: border-box;
    }

    /* Fade In Up Animation - Elements appear from below */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Slide Down Animation - Elements appear from top */
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Float Bounce - Continuous up/down floating */
    @keyframes floatBounce {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    /* Shimmer - Sliding shine effect */
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Glow - Pulsing box shadow */
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
      50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.8); }
    }

    /* Gradient - Moving gradient background */
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Typing - Typewriter width effect */
    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    /* Float - Gentle floating motion */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    /* Slide In Left - Slide from left to right */
    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-60px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Slide In Right - Slide from right to left */
    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(60px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Pulse Ring - Expanding circle effect */
    @keyframes pulse-ring {
      0% {
        transform: scale(0.8);
        opacity: 1;
      }
      100% {
        transform: scale(2);
        opacity: 0;
      }
    }

    /* Blob - Organic floating shape */
    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }

    /* Spin - Continuous rotation */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Animation Utility Classes */
    .fade-in-up {
      animation: fadeInUp 0.8s ease forwards;
    }

    .slide-down {
      animation: slideDown 0.8s ease;
    }

    .slide-left {
      animation: slideInLeft 0.8s ease forwards;
    }

    .slide-right {
      animation: slideInRight 0.8s ease forwards;
    }

    .float-bounce {
      animation: floatBounce 3s ease-in-out infinite;
    }

    /* Animation delay utilities for staggered effects */
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }
    .delay-5 { animation-delay: 1.0s; }

    /* Gradient Text - Animated gradient text effect */
    .gradient-text {
      background: linear-gradient(135deg, #3b82f6, #06b6d4, #22c55e, #f472b6);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient 6s ease infinite;
    }

    /* Secondary gradient for variety */
    .gradient-text-secondary {
      background: linear-gradient(135deg, #f472b6, #a855f7, #3b82f6);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient 8s ease infinite;
    }

    /* Gradient Button - Glowing button effect */
    .gradient-btn {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .gradient-btn:hover {
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.6);
      transform: translateY(-3px);
    }

    /* Shimmer effect on button hover */
    .gradient-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .gradient-btn:hover::before {
      left: 100%;
    }

    /* Glass Card - Frosted glass effect */
    .glass-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .glass-card:hover {
      background: rgba(30, 41, 59, 0.8);
      border-color: rgba(6, 182, 212, 0.3);
    }

    /* Service Card - Enhanced hover effect */
    .service-card {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .service-card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Skill Bar - Animated progress bar */
    .skill-bar {
      background: linear-gradient(90deg, #3b82f6, #06b6d4);
      border-radius: 10px;
      height: 8px;
      animation: slideInRight 1s ease forwards;
    }

    .skill-bar-container {
      overflow: hidden;
      height: 8px;
      background: rgba(148, 163, 184, 0.1);
      border-radius: 10px;
    }

    /* Active Navigation - Highlight current section */
    .active-nav {
      color: #06b6d4;
      border-bottom: 2px solid #06b6d4;
    }

    /* Typing cursor effect */
    .typing-text::after {
      content: '|';
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* 
      =================================================================
      CUSTOM FONT FAMILIES
      =================================================================
      Font family classes for different typography styles:
      - .font-display: Bebas Neue (bold display font)
      - .font-heading: Outfit (modern heading font)
      - .font-serif: Playfair Display (elegant serif)
      - .font-elegant: Cormorant Garamond (classic elegant)
      - .font-mono: JetBrains Mono (code font)
      - .font-modern: DM Sans (clean modern)
      - .font-tech: Space Grotesk (tech/sci-fi)
      - .font-accent: Abril Fatface (display accent)
      - .font-classic: Libre Baskerville (traditional classic)
      =================================================================
    */
    .font-display { font-family: 'Bebas Neue', sans-serif; }
    .font-heading { font-family: 'Outfit', sans-serif; }
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-elegant { font-family: 'Cormorant Garamond', serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .font-modern { font-family: 'DM Sans', sans-serif; }
    .font-tech { font-family: 'Space Grotesk', sans-serif; }
    .font-accent { font-family: 'Abril Fatface', serif; }
    .font-classic { font-family: 'Libre Baskerville', serif; }
    
    /* Base font for the page */
    body { font-family: 'DM Sans', sans-serif; }

    /* 
      =================================================================
      ADVANCED DESIGN ENHANCEMENTS
      =================================================================
    */
    
    /* Background animated shapes */
    .bg-blob {
      animation: blob 20s ease-in-out infinite;
    }

    /* Pulse ring effect */
    .pulse-ring {
      animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }

    /* Rotating gradient border */
    .gradient-border {
      position: relative;
    }
    
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(45deg, #3b82f6, #06b6d4, #22c55e, #f472b6, #a855f7);
      background-size: 400% 400%;
      animation: gradient 8s ease infinite;
      border-radius: inherit;
      z-index: -1;
    }

    /* Hover glow effect */
    .hover-glow:hover {
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
    }

    /* Text shadow for better readability */
    .text-shadow {
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, #06b6d4, #22c55e);
    }

    /* Smooth page scroll */
    html {
      scroll-behavior: smooth;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  
  <!-- Data SDK for configuration -->
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body>
  <!-- React Root Element - All content rendered here -->
  <div id="root"></div>
  
  <!-- 
    =================================================================
    REACT COMPONENT - Portfolio
    =================================================================
    Main React component containing the entire portfolio website.
    
    State Variables:
    - config: User configuration (name, tagline, about, etc.)
    - messageStatus: Contact form submission status
    - activeSection: Currently visible section for nav highlighting
    - displayedText: Typing animation text
    - textIndex: Current character index for typing effect
    
    Functions:
    - scrollToSection: Smooth scroll to section
    - handleContactSubmit: Form submission handler
    =================================================================
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Default configuration for the portfolio
    const defaultConfig = {
      name: "Anant",
      tagline: "passionate learner / future web developer",
      about_title: "About Me",
      about_text: "I'm a passionate developer with a keen interest in building modern, responsive, and user-friendly web applications. I love turning ideas into reality through code.",
      email: "anantjhunjhunwala344@gmail.com",
      github: "https://github.com/anant0987",
      linkedin: "https://linkedin.com/in/anantjhunjhunwala"
    };

    /**
     * Main Portfolio Component
     * Renders the entire portfolio website with sections:
     * - Navigation
     * - Hero (Introduction)
     * - About
     * - Skills
     * - Services (replaces Projects)
     * - Contact
     * - Footer
     */
    function Portfolio() {
      // State for portfolio configuration
      const [config, setConfig] = useState(defaultConfig);
      
      // State for contact form message status
      const [messageStatus, setMessageStatus] = useState({ show: false, type: '', text: '' });
      
      // State for tracking active section in navigation
      const [activeSection, setActiveSection] = useState('home');
      
      // State for typing animation
      const [displayedText, setDisplayedText] = useState('');
      const textIndex = useRef(0);

      // Full text to type out in hero section
      const fullText = "I am a future web developer with a passion for learning";

      // Initialize SDK for element customization (if available)
      useEffect(() => {
        if (window.elementSdk) {
          window.elementSdk.init({
            defaultConfig,
            onConfigChange: (newConfig) => {
              setConfig(newConfig);
            },
            mapToCapabilities: () => ({
              recolorables: [],
              borderables: [],
              fontEditable: undefined,
              fontSizeable: undefined
            }),
            mapToEditPanelValues: () => new Map([
              ["name", config.name || defaultConfig.name],
              ["tagline", config.tagline || defaultConfig.tagline],
              ["about_title", config.about_title || defaultConfig.about_title],
              ["about_text", config.about_text || defaultConfig.about_text],
              ["email", config.email || defaultConfig.email],
              ["github", config.github || defaultConfig.github],
              ["linkedin", config.linkedin || defaultConfig.linkedin]
            ])
          });
        }
      }, [config]);

      // Typing animation effect - gradually reveals text character by character
      useEffect(() => {
        if (textIndex.current < fullText.length) {
          const timer = setTimeout(() => {
            setDisplayedText(fullText.slice(0, textIndex.current + 1));
            textIndex.current++;
          }, 50); // 50ms delay between each character
          return () => clearTimeout(timer);
        }
      }, [displayedText]);

      /**
       * Scroll to a specific section smoothly
       * @param {string} id - The ID of the section to scroll to
       */
      const scrollToSection = (id) => {
        const element = document.getElementById(id);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth' });
          setActiveSection(id);
        }
      };

      /**
       * Handle contact form submission
       * Validates and processes the contact form
       * @param {Event} e - Form submission event
       */
      const handleContactSubmit = (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const name = formData.get('name');
        const email = formData.get('email');
        const message = formData.get('message');

        // Validate all fields are filled
        if (name && email && message) {
          setMessageStatus({ show: true, type: 'success', text: '✓ Message sent successfully! I\'ll get back to you soon.' });
          e.target.reset();
          // Hide message after 5 seconds
          setTimeout(() => {
            setMessageStatus({ show: false, type: '', text: '' });
          }, 5000);
        }
      };

      // Skills data organized by category
      const skills = {
        Frontend: ['HTML', 'CSS', 'JavaScript', 'React', 'Tailwind CSS'],
        Backend: ['Node.js', 'Python', 'MongoDB', 'Firebase', 'REST API'],
        Design: ['Figma', 'UI Design', 'UX Design', 'Prototyping'],
        Tools: ['Git', 'Webpack', 'Docker', 'VS Code']
      };

      // Services data - What I do (replaces Projects section)
      const services = [
        { 
          title: 'Web Development', 
          desc: 'Building modern, responsive websites and web applications using cutting-edge technologies.',
          icon: '💻',
          color: 'from-blue-500 to-cyan-500'
        },
        { 
          title: 'UI/UX Design', 
          desc: 'Creating intuitive and beautiful user interfaces that provide exceptional user experiences.',
          icon: '🎨',
          color: 'from-purple-500 to-pink-500'
        },
        { 
          title: 'Full-Stack Solutions', 
          desc: 'End-to-end development from database design to frontend implementation.',
          icon: '🚀',
          color: 'from-green-500 to-emerald-500'
        },
        { 
          title: 'Performance Optimization', 
          desc: 'Optimizing websites for speed and performance to ensure the best user experience.',
          icon: '⚡',
          color: 'from-orange-500 to-red-500'
        },
        { 
          title: 'API Development', 
          desc: 'Building robust and scalable RESTful APIs for web and mobile applications.',
          icon: '🔌',
          color: 'from-cyan-500 to-blue-500'
        },
        { 
          title: 'Technical Consulting', 
          desc: 'Providing expert advice on technology stack and architecture decisions.',
          icon: '📊',
          color: 'from-indigo-500 to-purple-500'
        }
      ];

      return (
        <div className="w-full h-full bg-gradient-to-br from-slate-950 via-blue-950/30 to-slate-950 text-slate-100 overflow-y-auto scroll-smooth">
          
          {/* 
            =================================================================
            BACKGROUND EFFECTS
            =================================================================
            Animated background blobs and gradient overlays for depth
          */}
          <div className="fixed inset-0 -z-10 overflow-hidden">
            {/* Primary background blobs */}
            <div className="absolute top-0 left-0 w-[600px] h-[600px] bg-blue-500/10 rounded-full blur-3xl bg-blob"></div>
            <div className="absolute bottom-0 right-0 w-[500px] h-[500px] bg-cyan-500/10 rounded-full blur-3xl bg-blob" style="animation-delay: -5s;"></div>
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-purple-500/10 rounded-full blur-3xl bg-blob" style="animation-delay: -10s;"></div>
            
            {/* Grid pattern overlay */}
            <div className="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg%20width%3D%2260%22%20height%3D%2260%22%20viewBox%3D%220%200%2060%2060%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cg%20fill%3D%22none%22%20fill-rule%3D%22evenodd%22%3E%3Cg%20fill%3D%22%239C92AC%22%20fill-opacity%3D%220.03%22%3E%3Cpath%20d%3D%22M36%2034v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6%2034v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6%204V0H4v4H0v2h4v4h2V6h4V4H6z%22%2F%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E')] opacity-30"></div>
          </div>

          {/* 
            =================================================================
            NAVIGATION
            =================================================================
            Fixed top navigation with glass effect and smooth scroll
          */}
          <nav className="fixed top-0 left-0 right-0 bg-slate-950/80 backdrop-blur-2xl z-50 border-b border-cyan-500/20">
            <div className="max-w-6xl mx-auto px-8 py-4 flex justify-between items-center">
              {/* Logo/Brand */}
<div className="text-3xl font-display font-bold gradient-text tracking-wider cursor-pointer" onClick={() => scrollToSection('home')}>
                PORTFOLIO
              </div>
              
              {/* Navigation Links */}
              <ul className="flex gap-8">
                {['home', 'about', 'skills', 'services', 'contact'].map((item) => (
                  <li key={item}>
                    <button
                      onClick={() => scrollToSection(item)}
                      className={`font-modern font-medium tracking-wide uppercase text-sm transition-all duration-300 pb-2 ${
                        activeSection === item
                          ? 'active-nav text-cyan-400'
                          : 'text-slate-300 hover:text-cyan-400'
                      }`}
                    >
                      {item}
                    </button>
                  </li>
                ))}
              </ul>
            </div>
          </nav>

          {/* 
            =================================================================
            HERO SECTION
            =================================================================
            Main introduction section with name, tagline, and CTA buttons
          */}
          <section id="home" className="min-h-screen flex items-center justify-center pt-24 px-8 relative overflow-hidden">
            <div className="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
              {/* Left Content - Name and Introduction */}
              <div className="space-y-8">
                <div className="fade-in-up">
                  {/* Welcome text with animated gradient */}
                  <p className="text-cyan-400 font-tech font-medium mb-4 tracking-widest uppercase text-sm flex items-center gap-2">
                    <span className="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></span>
                    Welcome to my portfolio
                  </p>
                  
                  {/* Main heading with gradient text */}
                  <h1 className="text-7xl lg:text-8xl font-display mb-6 tracking-wide leading-tight">
                    <span className="gradient-text">{config.name || defaultConfig.name}</span>
                  </h1>
                  
                  {/* Typing animation for tagline */}
                  <p className="text-2xl lg:text-3xl font-serif italic text-slate-300 mb-4 h-14 flex items-center">
                    <span className="typing-text">{displayedText}</span>
                  </p>
                </div>

                {/* Subtitle/Tagline */}
                <p className="text-lg font-modern text-slate-400 leading-relaxed fade-in-up delay-1 max-w-xl">
                  {config.tagline || defaultConfig.tagline}
                </p>

                {/* CTA Buttons */}
                <div className="flex flex-wrap gap-4 fade-in-up delay-2">
                  <button
                    onClick={() => scrollToSection('services')}
                    className="gradient-btn px-8 py-4 text-white font-semibold rounded-lg shadow-lg hover:shadow-cyan-500/25"
                  >
                    <span className="flex items-center gap-2">
                      <span>Explore Services</span>
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                      </svg>
                    </span>
                  </button>
                  <a
                    href="#contact"
                    className="px-8 py-4 bg-slate-800/80 hover:bg-slate-700 text-white font-semibold rounded-lg border border-slate-600 hover:border-cyan-500/50 transition-all"
                  >
                    <span className="flex items-center gap-2">
                      <span>Download Resume</span>
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                      </svg>
                    </span>
                  </a>
                </div>

                {/* Social Links with enhanced styling */}
                <div className="flex gap-4 fade-in-up delay-3">
